site_name: rustmc
site_description: Fast Bayesian inference in Rust with a Python API. 10,000 models in 70 seconds.
site_url: https://tbosier.github.io/rustmc
repo_url: https://github.com/tbosier/rustmc
repo_name: tbosier/rustmc

theme:
  name: material
  palette:
    - scheme: slate
      primary: deep orange
      accent: orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: deep orange
      accent: orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy
    - content.code.annotate

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Examples:
    - Linear Regression: examples/linear-regression.ipynb
    - Hierarchical Models: examples/hierarchical.ipynb
    - Batch Inference: examples/batch-inference.md
    - High-Dimensional Regression: examples/high-dimensional.md
  - API Reference: reference.md

plugins:
  - search
  - mkdocs-jupyter:
      execute: false
      include: ["*.ipynb"]
      ignore_h1: false
      show_input: true

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - tables
  - attr_list

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/tbosier/rustmc
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/rustmc
