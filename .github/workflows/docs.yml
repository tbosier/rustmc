name: Deploy Docs

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install docs dependencies
        run: pip install mkdocs-material mkdocs-jupyter jupyter nbconvert rustmc arviz matplotlib

      - name: Execute notebooks
        run: |
          jupyter nbconvert --to notebook --execute --inplace \
            --ExecutePreprocessor.timeout=300 \
            docs/examples/linear-regression.ipynb \
            docs/examples/hierarchical.ipynb

      - run: mkdocs gh-deploy --force
